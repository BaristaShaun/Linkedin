<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Agent - Text Mode</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0f; --surface: #111118; --border: #2a2a3a; --accent: #4f8ef7; --text: #e8e8f0; --muted: #6b6b88; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; }
  .wrap { max-width: 800px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 30px; color: var(--accent); }
  
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  input, textarea { 
    width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px; 
    padding: 12px; color: #fff; font-family: inherit; margin-bottom: 10px;
  }
  textarea { height: 200px; resize: vertical; }
  
  button { 
    width: 100%; padding: 15px; border-radius: 8px; border: none; 
    background: var(--accent); color: white; font-weight: bold; cursor: pointer;
  }
  button:disabled { background: #333; cursor: not-allowed; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-top: 15px; padding: 15px; }
  .card-title { font-family: 'DM Mono', monospace; color: var(--accent); font-size: 12px; margin-bottom: 10px; display: block; }
  .content { white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
  .error { color: #f87171; background: rgba(248,113,113,0.1); padding: 10px; border-radius: 5px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>

<div class="wrap">
  <h1>LinkedIn Builder (Text Only)</h1>

  <div class="panel">
    <input type="password" id="apiKey" placeholder="Gemini API Key 입력">
    <textarea id="resumeText" placeholder="이력서 내용을 여기에 붙여넣으세요..."></textarea>
    <div id="errorBox" class="error"></div>
    <button id="genBtn" onclick="generate()">✨ 프로필 생성 (텍스트 모드)</button>
  </div>

  <div id="status" style="text-align: center; color: var(--muted); display: none;">AI가 분석 중입니다... 잠시만 기다려주세요.</div>
  <div id="results"></div>
</div>

<script>
async function generate() {
  const key = document.getElementById('apiKey').value;
  const text = document.getElementById('resumeText').value;
  const btn = document.getElementById('genBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  const errorBox = document.getElementById('errorBox');

  if(!key || !text) return alert("키와 내용을 모두 입력해주세요.");

  btn.disabled = true;
  status.style.display = 'block';
  errorBox.style.display = 'none';
  results.innerHTML = '';

  // 하나의 프롬프트로 합쳐서 요청 횟수(Request Count)를 최소화함 (Quota 절약)
  const prompt = `
    Based on the following resume text, provide a LinkedIn profile optimization in JSON format.
    Keep it professional and high-impact.
    
    Resume Text: ${text}
    
    Return ONLY JSON:
    {
      "headline": "SEO optimized headline",
      "about": "First-person professional summary",
      "experience": ["bullet point 1", "bullet point 2"],
      "skills": ["skill1", "skill2"]
    }
  `;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API 호출 실패');
    
    const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
    const final = JSON.parse(cleanJson);

    results.innerHTML = `
      <div class="card"><span class="card-title">HEADLINE</span><div class="content">${final.headline}</div></div>
      <div class="card"><span class="card-title">ABOUT</span><div class="content">${final.about}</div></div>
      <div class="card"><span class="card-title">EXPERIENCE BULLETS</span><div class="content">${final.experience.join('\n')}</div></div>
      <div class="card"><span class="card-title">SKILLS</span><div class="content">${final.skills.join(', ')}</div></div>
    `;
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    status.style.display = 'none';
  }
}
</script>
</body>
</html>
