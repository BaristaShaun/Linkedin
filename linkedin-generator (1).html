<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Profile Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #4f8ef7;
    --accent2: #a78bfa;
    --gold: #f0c060;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --success: #34d399;
    --error: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease;
  }
  .header .tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.3);
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
    background: rgba(79,142,247,0.06);
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 6vw, 52px);
    line-height: 1.1;
    background: linear-gradient(135deg, #e8e8f0 0%, #a78bfa 50%, #4f8ef7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .header p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
  }

  /* API Key Panel */
  #apiPanel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease;
  }
  #apiPanel .panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .api-row {
    display: flex;
    gap: 10px;
  }
  .api-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-row input:focus { border-color: var(--accent); }
  .api-row input::placeholder { color: var(--muted); }
  .btn-save {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:active { transform: scale(0.97); }
  .api-status {
    margin-top: 10px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }
  .api-status.ok { color: var(--success); }
  .api-status.err { color: var(--error); }

  /* Upload Zone */
  #uploadZone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease;
    position: relative;
    overflow: hidden;
  }
  #uploadZone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(79,142,247,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #uploadZone:hover, #uploadZone.drag { border-color: var(--accent); }
  #uploadZone:hover::before, #uploadZone.drag::before { opacity: 1; }
  #uploadZone .upload-icon {
    font-size: 40px;
    margin-bottom: 14px;
    display: block;
  }
  #uploadZone h3 {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  #uploadZone p {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }
  #fileInput { display: none; }
  .file-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(79,142,247,0.12);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-top: 14px;
  }

  /* Generate Button */
  #generateBtn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    margin-bottom: 40px;
    box-shadow: 0 4px 24px rgba(79,142,247,0.2);
    animation: fadeUp 0.7s ease;
  }
  #generateBtn:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(79,142,247,0.35);
  }
  #generateBtn:active:not(:disabled) { transform: translateY(0); }
  #generateBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  #progress {
    display: none;
    margin-bottom: 32px;
    animation: fadeUp 0.4s ease;
  }
  .progress-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    color: var(--muted);
    transition: all 0.3s;
  }
  .step.active {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(79,142,247,0.06);
  }
  .step.done {
    border-color: var(--success);
    color: var(--success);
    background: rgba(52,211,153,0.06);
  }
  .step .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .step.active .dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1s infinite;
  }
  .step.done .dot { background: var(--success); }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* Results */
  #results {
    display: none;
    animation: fadeUp 0.5s ease;
  }
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .results-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--text);
  }
  .action-btns {
    display: flex;
    gap: 10px;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary-sm {
    background: var(--accent);
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary-sm:hover { opacity: 0.85; }

  /* Cards */
  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(79,142,247,0.3); }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .card-label {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .card-body {
    padding: 20px 22px;
  }
  .card-content {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card-content[contenteditable="true"] {
    outline: none;
    border-radius: 8px;
    padding: 8px;
    margin: -8px;
    transition: background 0.2s;
  }
  .card-content[contenteditable="true"]:focus {
    background: rgba(79,142,247,0.05);
  }
  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
    text-align: right;
  }
  .char-count.over { color: var(--error); }
  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn-copy {
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.25);
    color: var(--accent);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-copy:hover { background: rgba(79,142,247,0.2); }
  .btn-copy.copied { background: rgba(52,211,153,0.12); border-color: rgba(52,211,153,0.3); color: var(--success); }
  .btn-regen {
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.25);
    color: var(--accent2);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-regen:hover { background: rgba(167,139,250,0.2); }

  /* Skill tags */
  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .skill-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 13px;
    color: var(--text);
    transition: border-color 0.2s;
  }
  .skill-tag:hover { border-color: var(--accent); }

  /* Error */
  .error-box {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--error);
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* PDF export styles */
  #pdfTarget { display: none; }

  @media (max-width: 600px) {
    .api-row { flex-direction: column; }
    .results-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="tag">AI-POWERED · LINKEDIN AGENT</div>
    <h1>Resume → LinkedIn<br>Profile Generator</h1>
    <p>이력서를 업로드하면 AI가 LinkedIn 각 섹션을<br>최적화된 문구로 자동 생성해드립니다</p>
  </div>

  <!-- API Key -->
  <div id="apiPanel">
    <div class="panel-title">🔑 Gemini API Key</div>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="AIzaSy..." autocomplete="off">
      <button class="btn-save" onclick="saveKey()">저장</button>
    </div>
    <div id="apiStatus" class="api-status"></div>
  </div>

  <!-- Upload -->
  <div id="uploadZone" onclick="document.getElementById('fileInput').click()"
       ondragover="handleDrag(event, true)" ondragleave="handleDrag(event, false)"
       ondrop="handleDrop(event)">
    <span class="upload-icon">📄</span>
    <h3>이력서를 드래그하거나 클릭해서 업로드</h3>
    <p>PDF, DOCX, TXT 지원 · 최대 10MB</p>
    <div id="fileBadge" style="display:none" class="file-badge">
      <span>📎</span><span id="fileName"></span>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".pdf,.docx,.txt" onchange="handleFile(event)">

  <!-- Error -->
  <div id="errorBox" class="error-box"></div>

  <!-- Generate -->
  <button id="generateBtn" onclick="generate()" disabled>
    ✨ LinkedIn 프로필 생성하기
  </button>

  <!-- Progress -->
  <div id="progress">
    <div class="progress-steps">
      <div class="step" id="step1"><div class="dot"></div>이력서 파싱 중...</div>
      <div class="step" id="step2"><div class="dot"></div>Headline & About 작성 중...</div>
      <div class="step" id="step3"><div class="dot"></div>Experience 섹션 최적화 중...</div>
      <div class="step" id="step4"><div class="dot"></div>Skills & Education 정리 중...</div>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <h2>📋 LinkedIn 프로필 초안</h2>
      <div class="action-btns">
        <button class="btn-outline" onclick="copyAll()">📋 전체 복사</button>
        <button class="btn-primary-sm" onclick="downloadPDF()">⬇ PDF 저장</button>
      </div>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

</div>

<script>
// ─── State ───────────────────────────────────────────────
let apiKey = localStorage.getItem('gemini_key') || '';
let fileData = null; // { base64, mimeType, name }
let profileData = null;

// ─── Init ────────────────────────────────────────────────
window.onload = () => {
  if (apiKey) {
    document.getElementById('apiKeyInput').value = apiKey;
    setApiStatus('✓ 저장된 키 불러옴', 'ok');
  }
  checkReady();
};

// ─── API Key ─────────────────────────────────────────────
function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val.startsWith('AIza')) {
    setApiStatus('❌ 유효하지 않은 키 형식', 'err'); return;
  }
  apiKey = val;
  localStorage.setItem('gemini_key', val);
  setApiStatus('✓ 저장 완료 (로컬 브라우저에만 저장됨)', 'ok');
  checkReady();
}

function setApiStatus(msg, cls) {
  const el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.className = 'api-status ' + cls;
}

// ─── File Handling ────────────────────────────────────────
function handleDrag(e, on) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.toggle('drag', on);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  showError('');
  const allowed = ['application/pdf', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'text/plain'];
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','docx','txt'].includes(ext)) {
    showError('PDF, DOCX, TXT 파일만 지원합니다.'); return;
  }
  if (file.size > 10 * 1024 * 1024) {
    showError('파일 크기는 10MB 이하여야 합니다.'); return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result.split(',')[1];
    let mimeType = file.type || 'application/octet-stream';
    if (ext === 'docx') mimeType = 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
    fileData = { base64, mimeType, name: file.name };

    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileBadge').style.display = 'inline-flex';
    checkReady();
  };
  reader.readAsDataURL(file);
}

function checkReady() {
  const ready = apiKey && fileData;
  document.getElementById('generateBtn').disabled = !ready;
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ─── Gemini API ───────────────────────────────────────────
async function callGemini(prompt, includeFile = false) {
  const parts = [];
  if (includeFile && fileData) {
    parts.push({
      inline_data: { mime_type: fileData.mimeType, data: fileData.base64 }
    });
  }
  parts.push({ text: prompt });

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts }] })
    }
  );

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || `API 오류 (${res.status})`);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

// ─── Agent Steps ──────────────────────────────────────────
function setStep(num, state) {
  // state: 'active' | 'done' | ''
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('step' + i);
    el.className = 'step' + (i === num ? ' ' + state : i < num ? ' done' : '');
  }
}

async function generate() {
  if (!apiKey || !fileData) return;
  showError('');

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('progress').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  try {
    // ── Step 1: Parse ──
    setStep(1, 'active');
    const parsePrompt = `You are a resume parser. Extract structured information from this resume and return ONLY a JSON object (no markdown, no backticks) with this exact schema:
{
  "name": "...",
  "currentTitle": "...",
  "email": "...",
  "location": "...",
  "summary": "...",
  "experiences": [
    { "company": "...", "title": "...", "period": "...", "description": "..." }
  ],
  "education": [
    { "school": "...", "degree": "...", "field": "...", "period": "..." }
  ],
  "skills": ["skill1", "skill2"],
  "languages": ["..."],
  "certifications": ["..."],
  "projects": [
    { "name": "...", "description": "..." }
  ]
}`;
    const rawParse = await callGemini(parsePrompt, true);
    let parsed;
    try {
      const clean = rawParse.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      throw new Error('이력서 파싱 실패. PDF가 텍스트 기반인지 확인해주세요.');
    }
    setStep(1, 'done'); setStep(2, 'active');

    // ── Step 2: Headline & About ──
    const haPrompt = `You are a LinkedIn profile expert. Based on this resume data, write:
1. A compelling LinkedIn headline (max 120 chars) - punchy, keyword-rich, specific
2. A compelling LinkedIn About section (max 2000 chars) - first person, achievement-focused, tells a story

Resume data: ${JSON.stringify(parsed)}

Return ONLY a JSON object (no markdown):
{ "headline": "...", "about": "..." }`;
    const haRaw = await callGemini(haPrompt);
    let haData;
    try {
      haData = JSON.parse(haRaw.replace(/```json|```/g, '').trim());
    } catch { haData = { headline: '', about: '' }; }
    setStep(2, 'done'); setStep(3, 'active');

    // ── Step 3: Experience bullets ──
    const expPrompt = `You are a LinkedIn profile expert. Rewrite each work experience as optimized LinkedIn bullets.
Use: strong action verbs, quantify impact where possible, focus on achievements not duties.
Each bullet: 1-2 sentences max.

Experiences: ${JSON.stringify(parsed.experiences)}

Return ONLY a JSON array (no markdown):
[{ "company": "...", "title": "...", "period": "...", "bullets": ["bullet1","bullet2","bullet3"] }]`;
    const expRaw = await callGemini(expPrompt);
    let expData;
    try {
      expData = JSON.parse(expRaw.replace(/```json|```/g, '').trim());
    } catch { expData = parsed.experiences?.map(e => ({ ...e, bullets: [e.description] })) || []; }
    setStep(3, 'done'); setStep(4, 'active');

    // ── Step 4: Skills optimization ──
    const skillsPrompt = `Based on this resume, curate the top 15 most impactful LinkedIn skills (mix of technical and soft skills).
Resume: ${JSON.stringify(parsed)}
Return ONLY a JSON array of strings (no markdown): ["skill1","skill2",...]`;
    const skillsRaw = await callGemini(skillsPrompt);
    let skills;
    try {
      skills = JSON.parse(skillsRaw.replace(/```json|```/g, '').trim());
    } catch { skills = parsed.skills || []; }
    setStep(4, 'done');

    // ── Assemble profile ──
    profileData = { parsed, haData, expData, skills };
    renderResults(profileData);

  } catch (err) {
    showError('❌ ' + err.message);
    document.getElementById('progress').style.display = 'none';
  } finally {
    document.getElementById('generateBtn').disabled = false;
  }
}

// ─── Render Cards ─────────────────────────────────────────
function renderResults(data) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  const cards = [
    {
      id: 'headline',
      icon: '⚡', iconBg: 'rgba(240,192,96,0.15)',
      title: 'HEADLINE',
      limit: 120,
      content: data.haData.headline,
      type: 'text'
    },
    {
      id: 'about',
      icon: '👤', iconBg: 'rgba(79,142,247,0.15)',
      title: 'ABOUT',
      limit: 2600,
      content: data.haData.about,
      type: 'text'
    },
    ...data.expData.map((exp, i) => ({
      id: 'exp_' + i,
      icon: '💼', iconBg: 'rgba(167,139,250,0.15)',
      title: `EXPERIENCE · ${exp.company}`,
      content: [exp.title, exp.period, '', ...(exp.bullets || []).map(b => '• ' + b)].join('\n'),
      type: 'text'
    })),
    {
      id: 'skills',
      icon: '🛠', iconBg: 'rgba(52,211,153,0.15)',
      title: 'SKILLS',
      content: data.skills,
      type: 'skills'
    },
    ...(data.parsed.education?.length ? [{
      id: 'education',
      icon: '🎓', iconBg: 'rgba(248,113,113,0.15)',
      title: 'EDUCATION',
      content: data.parsed.education.map(e =>
        [e.school, e.degree + (e.field ? ` · ${e.field}` : ''), e.period].filter(Boolean).join('\n')
      ).join('\n\n'),
      type: 'text'
    }] : []),
    ...(data.parsed.certifications?.length ? [{
      id: 'certs',
      icon: '🏆', iconBg: 'rgba(240,192,96,0.15)',
      title: 'CERTIFICATIONS',
      content: data.parsed.certifications.join('\n'),
      type: 'text'
    }] : [])
  ];

  cards.forEach(card => grid.appendChild(makeCard(card)));
  document.getElementById('progress').style.display = 'none';
  document.getElementById('results').style.display = 'block';
}

function makeCard(cfg) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card_' + cfg.id;

  const limitHtml = cfg.limit
    ? `<div class="char-count" id="count_${cfg.id}">0 / ${cfg.limit}</div>` : '';

  const contentHtml = cfg.type === 'skills'
    ? `<div class="skill-tags" id="content_${cfg.id}">${cfg.content.map(s =>
        `<span class="skill-tag">${s}</span>`).join('')}</div>`
    : `<div class="card-content" contenteditable="true" id="content_${cfg.id}"
            oninput="updateCount('${cfg.id}', ${cfg.limit})">${cfg.content}</div>
       ${limitHtml}`;

  card.innerHTML = `
    <div class="card-header">
      <div class="card-label">
        <div class="card-icon" style="background:${cfg.iconBg}">${cfg.icon}</div>
        <div class="card-title">${cfg.title}</div>
      </div>
      <div class="card-actions">
        <button class="btn-copy" id="copybtn_${cfg.id}" onclick="copyCard('${cfg.id}')">복사</button>
        <button class="btn-regen" onclick="regenCard('${cfg.id}')">↻ 재생성</button>
      </div>
    </div>
    <div class="card-body">${contentHtml}</div>
  `;

  if (cfg.limit) setTimeout(() => updateCount(cfg.id, cfg.limit), 0);
  return card;
}

function updateCount(id, limit) {
  const el = document.getElementById('content_' + id);
  const cnt = document.getElementById('count_' + id);
  if (!el || !cnt) return;
  const len = el.innerText.length;
  cnt.textContent = `${len} / ${limit}`;
  cnt.className = 'char-count' + (len > limit ? ' over' : '');
}

// ─── Copy ─────────────────────────────────────────────────
function copyCard(id) {
  const el = document.getElementById('content_' + id);
  const text = el?.innerText || el?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copybtn_' + id);
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1800);
  });
}

function copyAll() {
  const sections = document.querySelectorAll('.card-content, .skill-tags');
  let text = '';
  document.querySelectorAll('.card').forEach(card => {
    const title = card.querySelector('.card-title')?.textContent || '';
    const content = card.querySelector('.card-content, .skill-tags');
    if (content) {
      text += `\n──── ${title} ────\n${content.innerText || content.textContent}\n`;
    }
  });
  navigator.clipboard.writeText(text.trim());
}

// ─── Regen ────────────────────────────────────────────────
async function regenCard(id) {
  const btn = document.querySelector(`#card_${id} .btn-regen`);
  btn.textContent = '⟳ 생성 중...';
  btn.disabled = true;
  try {
    if (id === 'headline') {
      const raw = await callGemini(`Rewrite this LinkedIn headline with a fresh angle, still max 120 chars, no quotes:\n${profileData.haData.headline}`);
      document.getElementById('content_headline').innerText = raw.trim().replace(/^["']|["']$/g, '');
      updateCount('headline', 120);
    } else if (id === 'about') {
      const raw = await callGemini(`Rewrite this LinkedIn About section with a different opening hook, same person, max 2000 chars:\n${profileData.haData.about}`);
      document.getElementById('content_about').innerText = raw.trim();
      updateCount('about', 2600);
    } else if (id === 'skills') {
      const raw = await callGemini(`Suggest 15 different LinkedIn skills for this profile:\n${JSON.stringify(profileData.parsed)}\nReturn ONLY a JSON array of strings.`);
      const skills = JSON.parse(raw.replace(/```json|```/g, '').trim());
      document.getElementById('content_skills').innerHTML = skills.map(s =>
        `<span class="skill-tag">${s}</span>`).join('');
    }
  } catch (e) {
    showError('재생성 실패: ' + e.message);
  } finally {
    btn.textContent = '↻ 재생성';
    btn.disabled = false;
  }
}

// ─── PDF ──────────────────────────────────────────────────
function downloadPDF() {
  const element = document.getElementById('cardsGrid');
  const opt = {
    margin: 12,
    filename: 'linkedin-profile.pdf',
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, backgroundColor: '#0a0a0f' },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(element).save();
}
</script>
